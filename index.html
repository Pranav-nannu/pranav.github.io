<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holidae</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <a href="#" class="logo">Holidae</a>
        <nav class="navbar">
            <a href="#home">Home</a>
            <a href="#destinations">Destination</a>
            <a href="#packages">Packages</a>
            <a href="#blog">Blog</a>
            <a href="#" class="book">Book Now</a>
        </nav>
    </header>
    <section class="home" id="home">
        <div class="content">
            <h1>Discover Your Next Adventure</h1>
            <p>Explore the world with Holidae. Find the best travel deals and unforgettable experiences.</p>
            <a href="#" class="btn">Get Started</a>
        </div>
    </section>
    <section class="destinations" id="destinations">
        <h2>Top Destinations</h2>
         <div class="box-container">
            <div class="box">
                <img src="paris.jpg" alt="Paris">
                <div class="info">
                    <h3>Paris, France</h3>
                </div>
            </div>
            <div class="box">
                <img src="bali.jpg" alt="Bali">
                <div class="info">
                    <h3>Bali, Indonesia</h3>
                </div>
            </div>
            <div class="box">
                <img src="newyork.jpg" alt="New York">
                <div class="info">
                    <h3>New York, USA</h3>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
